{% extends "jobs/base.html" %}

{% block title %}Password Changed{% endblock %}

{% block content %}
<section class="min-h-screen bg-gradient-to-br from-slate-100 via-green-50 to-emerald-100 py-12 px-4 flex items-center justify-center">
    <div class="max-w-md w-full">
        <div class="bg-white rounded-3xl shadow-2xl border border-gray-100 p-8 text-center">

            <div class="w-20 h-20 mx-auto rounded-full bg-green-100 flex items-center justify-center mb-6">
                <svg class="w-10 h-10 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M5 13l4 4L19 7">
                    </path>
                </svg>
            </div>

            <h1 class="text-3xl font-bold text-gray-800 mb-3">Password Changed</h1>
            <p class="text-gray-600 mb-8">
                Your password has been updated successfully. Your account is now secured with the new password.
            </p>

            <div class="flex flex-col sm:flex-row gap-3 justify-center">
                <a href="{% url 'profile' %}"
                   class="px-6 py-3 rounded-xl bg-gradient-to-r from-indigo-700 to-blue-700 text-white font-semibold hover:from-indigo-800 hover:to-blue-800 transition shadow-md">
                    Go to Profile
                </a>

                <a href="{% url 'home' %}"
                   class="px-6 py-3 rounded-xl border border-gray-300 text-gray-700 font-medium hover:bg-gray-50 transition">
                    Back to Home
                </a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
